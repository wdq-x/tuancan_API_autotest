name: API Regression

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Weekdays at 09:00 Asia/Shanghai. GitHub Actions schedules use UTC.
    - cron: "0 1 * * 1-5"

permissions:
  contents: read

# Full regression writes and cleans up shared test data. Do not run two jobs at once.
concurrency:
  group: api-regression
  cancel-in-progress: false

jobs:
  api-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      report_available: ${{ steps.report_check.outputs.available }}
    env:
      PYTHONUTF8: "1"
      API_BASE_URL: https://sa-demo-cloud.holderzone.cn
      MANAGEMENT_TEST_USERNAME: ${{ secrets.MANAGEMENT_TEST_USERNAME }}
      MANAGEMENT_TEST_PASSWORD: ${{ secrets.MANAGEMENT_TEST_PASSWORD }}
      ENABLE_WRITE_TESTS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Validate test configuration
        run: >
          python -c "import os, sys; required = ('API_BASE_URL', 'MANAGEMENT_TEST_USERNAME', 'MANAGEMENT_TEST_PASSWORD'); missing = [name for name in required if not os.getenv(name)]; sys.exit('Missing required GitHub Actions secrets: ' + ', '.join(missing)) if missing else None"

      - name: Run full API regression
        run: >
          python -m pytest test_case -q
          --alluredir=allure-results
          --junitxml=test-results/junit.xml

      - name: Check Allure results
        id: report_check
        if: always()
        shell: bash
        run: |
          if [ -d allure-results ] && find allure-results -type f -name '*-result.json' -print -quit | grep -q .; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java for Allure
        if: always() && steps.report_check.outputs.available == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate Allure HTML report
        if: always() && steps.report_check.outputs.available == 'true'
        run: |
          npm install --global allure-commandline@2.29.0
          allure generate allure-results --clean -o allure-report

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-${{ github.run_number }}
          path: |
            allure-results
            test-results
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Allure report for GitHub Pages
        if: always() && steps.report_check.outputs.available == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  publish-report:
    needs: api-test
    if: always() && needs.api-test.outputs.report_available == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
